<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>CoreAssets Premium TV Engine</title>
    <!-- Core Streaming Engine (Lightweight Version) -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Poppins", sans-serif; }
      body { background-color: #000000; color: #ffffff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; -webkit-user-select: none; user-select: none; }
      
      /* --- HEADER (Bigger Text for TV) --- */
      .header { background: #050505; padding: 15px 30px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1a1a1a; flex-shrink: 0; }
      .header-title h1 { font-size: 32px; font-weight: 600; letter-spacing: 2px; color: #ffffff; }
      .header-title span { color: #ff3333; font-weight: 400; }
      
      .live-clock-container { font-size: 24px; font-weight: 600; color: #fff; font-family: monospace; letter-spacing: 1px; background: #111; padding: 10px 20px; border-radius: 8px; border: 1px solid #222; }

      /* --- MAIN LAYOUT --- */
      .main-container { display: flex; flex: 1; height: calc(100vh - 85px); width: 100%; overflow: hidden; }
      
      /* Width adjusted per User Request (Wider Sidebar) */
      .viewport-section { width: 62%; background: #000; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; border-right: 1px solid #222; }
      video { width: 100%; height: 100%; background: #000; object-fit: contain; cursor: pointer; }
      .viewport-section.maximized { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 99999; border: none; }

      .channel-toast { position: absolute; top: 30px; right: 30px; background: rgba(0, 0, 0, 0.9); border: 2px solid #333; color: #ffffff; padding: 15px 30px; border-radius: 8px; font-size: 22px; font-weight: 600; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; z-index: 10010; }
      .channel-toast.show { opacity: 1; }

      /* --- CONTROLS (Spaced out for TV) --- */
      .custom-controls-bar { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(transparent, rgba(0, 0, 0, 0.95)); padding: 30px 40px; display: flex; justify-content: space-between; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 10000; }
      .custom-controls-bar.show { opacity: 1; pointer-events: auto; }
      
      .controls-left, .controls-right { display: flex; align-items: center; gap: 35px; /* Increased gap */ }
      .control-icon-btn { background: none; border: none; color: #ffffff; font-size: 26px; cursor: pointer; outline: none; transition: transform 0.2s, color 0.2s; }
      .control-icon-btn:hover { color: #ff3333; transform: scale(1.1); }
      .control-icon-btn:focus { color: #ff3333; transform: scale(1.1); } /* For TV Remote Focus */
      
      .bar-arrows-group { display: flex; align-items: center; gap: 40px; margin: 0 20px; }
      
      /* --- SIDEBAR (Wider, Bigger Cards) --- */
      .sidebar { width: 38%; background: #0a0a0a; display: flex; flex-direction: column; position: relative; height: 100%; overflow: hidden; }
      
      .search-container { padding: 20px; background: #0a0a0a; display: flex; align-items: center; flex-shrink: 0; }
      .search-container input { width: 100%; padding: 16px 25px; font-size: 18px; border: 1px solid #333; border-radius: 30px; background: #111; color: #fff; outline: none; transition: background 0.3s; }
      .search-container input:focus { border-color: #555; background: #1a1a1a; }

      /* Category Scroll without auto-JS */
      .category-container { display: flex; flex-wrap: nowrap; overflow-x: auto; gap: 12px; padding: 0 20px 20px 20px; flex-shrink: 0; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
      .category-container::-webkit-scrollbar { height: 6px; }
      .category-container::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
      
      .cat-btn { background: #141414; border: 1px solid #222; color: #aaa; padding: 10px 22px; border-radius: 25px; font-size: 15px; cursor: pointer; white-space: nowrap; outline: none; transition: all 0.2s; }
      .cat-btn:hover, .cat-btn:focus { background: #2a2a2a; color: #fff; border-color: #555; transform: scale(1.05); }
      .cat-btn.active { background: #ffffff; color: #000000; border-color: #ffffff; font-weight: 600; }

      .asset-grid { flex: 1; overflow-y: auto; padding: 0 20px 20px 20px; display: flex; flex-wrap: wrap; gap: 15px; align-content: flex-start; }
      .asset-grid::-webkit-scrollbar { width: 8px; } 
      .asset-grid::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
      
      /* Bigger Cards */
      .item-card { background: #111; border: 1px solid #222; border-radius: 12px; height: 130px; width: calc(33.33% - 10px); padding: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: all 0.2s ease; outline: none; }
      .item-card:hover, .item-card:focus { background: #1a1a1a; border-color: #666; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255, 255, 255, 0.05); }
      .item-card img { max-width: 100%; max-height: 60px; object-fit: contain; margin-bottom: 10px; display: block; }
      .item-card span { font-size: 15px; font-weight: 400; text-align: center; color: #bbb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; display: block; }
      
      .item-card.active-item { background: #ffffff !important; border-color: #ffffff !important; transform: scale(1.02); }
      .item-card.active-item span { color: #000000 !important; font-weight: 600 !important; }
      .item-card.active-item img { filter: brightness(0); }

      /* --- MOBILE LAYOUT --- */
      @media (max-width: 768px) {
        body { overflow-y: auto; display: block; height: auto; }
        .header { padding: 15px; flex-direction: column; gap: 10px; text-align: center; }
        .header-title h1 { font-size: 26px; }
        .live-clock-container { font-size: 18px; padding: 8px 15px; }
        .main-container { flex-direction: column; height: auto; display: block; }
        .viewport-section { width: 100% !important; height: 35vh; min-height: 250px; position: sticky; top: 0; z-index: 999; border-right: none; border-bottom: 1px solid #333; }
        .sidebar { width: 100% !important; height: auto; }
        .custom-controls-bar { padding: 15px; }
        .bar-arrows-group { gap: 20px; }
        .item-card { width: calc(50% - 8px); height: 110px; } 
      }
    </style>
  </head>
  <body>

    <div class="header">
      <div class="header-title">
        <h1>CORE<span>ASSETS</span></h1>
      </div>
      <div class="live-clock-container" id="liveClock">Loading Time...</div>
    </div>

    <div class="main-container">
      <div class="viewport-section" id="viewportSection">
        <video id="main-player" autoplay playsinline></video>
        <div class="channel-toast" id="channelToast">Channel Name</div>

        <div class="custom-controls-bar" id="customControlsBar">
          <div class="controls-left">
            <button class="control-icon-btn" onclick="togglePlayPause()" tabindex="-1"><i id="playPauseIcon" class="fa-solid fa-pause"></i></button>
          </div>
          
          <div class="controls-right">
            <div class="bar-arrows-group">
              <button class="control-icon-btn" onclick="changeChannel(-1, event)" title="Previous Channel" tabindex="-1"><i class="fa-solid fa-backward-step"></i></button>
              <button class="control-icon-btn" onclick="changeChannel(1, event)" title="Next Channel" tabindex="-1"><i class="fa-solid fa-forward-step"></i></button>
            </div>
            <button class="control-icon-btn" onclick="toggleMaximizeMode()" title="Fullscreen" tabindex="-1">
              <i id="maximizeIcon" class="fa-solid fa-expand"></i>
            </button>
          </div>
        </div>
      </div>

      <div class="sidebar">
        <div class="search-container">
          <input type="text" id="searchInput" placeholder="Search Channels..." onkeyup="filterItems()" tabindex="0" />
        </div>
        
        <div class="category-container" id="categoryContainer">
          <button class="cat-btn active" onclick="switchCategory('All', this)" tabindex="0">All</button>
          <button class="cat-btn" onclick="switchCategory('Bangla', this)" tabindex="0">Bangla</button>
          <button class="cat-btn" onclick="switchCategory('Sports', this)" tabindex="0">Sports</button>
          <button class="cat-btn" onclick="switchCategory('Movies', this)" tabindex="0">Movies</button>
          <button class="cat-btn" onclick="switchCategory('Spiritual', this)" tabindex="0">Spiritual</button>
          <button class="cat-btn" onclick="switchCategory('Cartoon', this)" tabindex="0">Cartoon</button>
          <button class="cat-btn" onclick="switchCategory('Geography', this)" tabindex="0">Geography</button>
          <button class="cat-btn" onclick="switchCategory('Bangla News', this)" tabindex="0">Bangla News</button>
          <button class="cat-btn" onclick="switchCategory('Indian', this)" tabindex="0">Indian</button>
          <button class="cat-btn" onclick="switchCategory('Others', this)" tabindex="0">Others</button>
        </div>

        <div class="asset-grid" id="assetGrid"></div>
      </div>
    </div>

    <script>
      // 1. Fixed BD Time Clock (Solves TV 30 min delay)
      function updateClock() {
        var now = new Date();
        // Get UTC time in milliseconds
        var utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        // Add 6 hours for Bangladesh Time (UTC + 6)
        var bdTime = new Date(utc + (3600000 * 6));
        
        var hr = bdTime.getHours();
        var min = bdTime.getMinutes();
        var sec = bdTime.getSeconds();
        var ampm = hr >= 12 ? 'PM' : 'AM';
        
        hr = hr % 12;
        hr = hr ? hr : 12; 
        
        var finalTime = 
            (hr < 10 ? '0' + hr : hr) + ':' + 
            (min < 10 ? '0' + min : min) + ':' + 
            (sec < 10 ? '0' + sec : sec) + ' ' + ampm;
            
        document.getElementById("liveClock").innerText = finalTime;
      }
      setInterval(updateClock, 1000);
      updateClock();

      // Data Core (From Fast Old Code)
      var cacheBuster = new Date().getTime();
      var dataSourceUrl = "https://gist.githubusercontent.com/ayonpaulofficial-bit/0634edaf19b269aba5bf62523cc19e15/raw/sdyt.m3u?cb=" + cacheBuster;
      var totalItems = [];
      var displayItems = [];
      var activeChannel = null;
      var corePlayer = document.getElementById("main-player");
      var assetGrid = document.getElementById("assetGrid");
      var customControlsBar = document.getElementById("customControlsBar");
      var controlTimer = null;
      var hls = null;

      // Disable Right Click
      document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

      // Fetch M3U Data
      var xhr = new XMLHttpRequest();
      xhr.open("GET", dataSourceUrl, true);
      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && (xhr.status === 200 || xhr.status === 0)) {
          var data = xhr.responseText;
          var lines = data.split("\n");
          var currentItem = null;

          for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim();
            if (line.indexOf("#EXTINF") === 0) {
              var name = "Unknown Channel", logo = "", group = "Others";
              var nameSplit = line.split(",");
              if (nameSplit.length > 1) name = nameSplit[1].trim();
              
              var logoMatch = line.match(/tvg-logo="(.*?)"/);
              if (logoMatch) logo = logoMatch[1];
              
              var groupMatch = line.match(/group-title="(.*?)"/); 
              if (groupMatch) group = groupMatch[1];

              currentItem = { name: name, logo: logo, category: group };
            } else if (line && line.indexOf("#") !== 0) {
              if (currentItem) {
                currentItem.url = line;
                totalItems.push(currentItem);
                currentItem = null;
              }
            }
          }
          switchCategory('All', document.querySelector('.cat-btn.active'));
        }
      };
      xhr.send();

      function switchCategory(categoryName, element) {
        var buttons = document.querySelectorAll(".cat-btn");
        for (var i = 0; i < buttons.length; i++) {
            buttons[i].classList.remove("active");
        }
        if (element) element.classList.add("active");
        
        document.getElementById("searchInput").value = "";
        displayItems = [];
        
        for (var j = 0; j < totalItems.length; j++) {
          if (categoryName === 'All' || totalItems[j].category.toLowerCase() === categoryName.toLowerCase()) {
            displayItems.push(totalItems[j]);
          }
        }
        buildGrid();
      }

      function filterItems() {
        var query = document.getElementById("searchInput").value.toLowerCase();
        var cards = document.querySelectorAll(".item-card");
        for (var i = 0; i < displayItems.length; i++) {
          if (cards[i]) {
            if (displayItems[i].name.toLowerCase().indexOf(query) !== -1) { 
                cards[i].style.display = "flex";
            } else { 
                cards[i].style.display = "none";
            }
          }
        }
      }

      function buildGrid() {
        assetGrid.innerHTML = "";
        for (var i = 0; i < displayItems.length; i++) {
          var item = displayItems[i];
          var card = document.createElement("button"); // Used button for native TV remote focus
          var extraClass = (activeChannel && activeChannel.url === item.url) ? " active-item" : "";
          card.className = "item-card" + extraClass;
          card.id = "item-" + i;
          card.tabIndex = 0;

          if (item.logo) {
            card.innerHTML = '<img src="' + item.logo + '" onerror="this.style.display=\'none\'"> <span>' + item.name + '</span>';
          } else {
            card.innerHTML = '<span>' + item.name + '</span>';
          }

          (function(currentItem, idx) {
            card.onclick = function() { streamSource(currentItem, idx); };
          })(item, i);

          assetGrid.appendChild(card);
        }
        // Auto play first item only on initial load
        if (!activeChannel && displayItems.length > 0) { 
            streamSource(displayItems[0], 0);
        }
      }

      // Fast Streaming Logic (From Fast Old Code)
      function streamSource(item, index) {
        if (!item) return;
        activeChannel = item;

        if (hls) {
            hls.destroy();
            if (corePlayer.src) {
                corePlayer.removeAttribute('src');
                corePlayer.load();
            }
        }

        var startPlayback = function() {
            var playPromise = corePlayer.play();
            if (playPromise !== undefined) { 
                playPromise.catch(function(error) { console.log("Autoplay blocked"); }); 
            }
        };

        if (typeof Hls !== 'undefined' && Hls.isSupported()) {
          hls = new Hls(); // Default fast config
          hls.loadSource(item.url);
          hls.attachMedia(corePlayer);
          hls.on(Hls.Events.MANIFEST_PARSED, startPlayback);
        } else if (corePlayer.canPlayType("application/vnd.apple.mpegurl")) {
          corePlayer.src = item.url;
          corePlayer.addEventListener("loadedmetadata", startPlayback);
        } else {
          corePlayer.src = item.url;
          startPlayback();
        }

        // Update UI Active State
        var allCards = document.querySelectorAll(".item-card");
        for (var j = 0; j < allCards.length; j++) {
          allCards[j].classList.remove("active-item");
        }
        var activeCard = document.getElementById("item-" + index);
        if (activeCard) {
          activeCard.classList.add("active-item");
        }

        showToast(item.name);
      }

      function changeChannel(step, event) {
        if (event) event.stopPropagation();
        if (!activeChannel || displayItems.length === 0) return;
        
        var currentIdx = -1;
        for(var i = 0; i < displayItems.length; i++) {
            if(displayItems[i].url === activeChannel.url) { 
                currentIdx = i; break; 
            }
        }
        if (currentIdx !== -1) {
          var targetIdx = (currentIdx + step + displayItems.length) % displayItems.length;
          streamSource(displayItems[targetIdx], targetIdx);
          
          var targetCard = document.getElementById("item-" + targetIdx);
          if (targetCard && targetCard.scrollIntoView) {
              targetCard.scrollIntoView({ behavior: "smooth", block: "nearest" });
          }
        }
      }

      function togglePlayPause() { 
          if (corePlayer.paused) { corePlayer.play(); } else { corePlayer.pause(); } 
      }
      corePlayer.addEventListener("play", function() { document.getElementById("playPauseIcon").className = "fa-solid fa-pause"; });
      corePlayer.addEventListener("pause", function() { document.getElementById("playPauseIcon").className = "fa-solid fa-play"; });

      function showToast(text) {
          var toast = document.getElementById("channelToast");
          toast.innerText = text;
          toast.classList.add("show");
          setTimeout(function() { toast.classList.remove("show"); }, 3000);
      }

      function triggerControlsOverlay() {
        customControlsBar.classList.add("show");
        clearTimeout(controlTimer);
        controlTimer = setTimeout(function() {
          customControlsBar.classList.remove("show");
        }, 3500);
      }

      function toggleMaximizeMode() {
        var vp = document.getElementById("viewportSection");
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
          if (vp.requestFullscreen) vp.requestFullscreen();
          else if (vp.webkitRequestFullscreen) vp.webkitRequestFullscreen();
        } else {
          if (document.exitFullscreen) document.exitFullscreen();
          else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
      }

      document.addEventListener("fullscreenchange", function() {
        var vp = document.getElementById("viewportSection");
        if (document.fullscreenElement) {
          vp.classList.add("maximized");
          document.getElementById("maximizeIcon").className = "fa-solid fa-compress";
        } else {
          vp.classList.remove("maximized");
          document.getElementById("maximizeIcon").className = "fa-solid fa-expand";
        }
        triggerControlsOverlay();
      });

      document.getElementById("viewportSection").addEventListener("mousemove", triggerControlsOverlay);
      document.getElementById("viewportSection").addEventListener("click", triggerControlsOverlay);
      corePlayer.addEventListener("dblclick", toggleMaximizeMode);

      // Keyboard & TV Remote Control System (Arrow Keys Fix)
      document.addEventListener("keydown", function(e) {
        triggerControlsOverlay();
        
        // If user is typing in search, don't change channels
        if (e.target.tagName === 'INPUT') return;
        
        // If user is navigating categories/grid with TV remote, let native browser handle it
        if (e.target.tagName === 'BUTTON' && (e.key === 'ArrowRight' || e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'ArrowDown')) {
            return; 
        }

        // Global Channel Change via Left/Right Arrows (Laptop/PC/TV)
        if (e.key === 'ArrowRight' || e.keyCode === 39 || e.keyCode === 427 || e.key === 'ChannelUp') { 
            e.preventDefault(); changeChannel(1); 
        } 
        else if (e.key === 'ArrowLeft' || e.keyCode === 37 || e.keyCode === 428 || e.key === 'ChannelDown') { 
            e.preventDefault(); changeChannel(-1); 
        }
      });
      
      // Mouse Wheel Horizontal Scroll for Category (PC Users)
      document.getElementById("categoryContainer").addEventListener('wheel', function(e) {
        e.preventDefault();
        this.scrollLeft += (e.deltaY || e.deltaX);
      });
    </script>
  </body>
</html>
