<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>CoreAssets</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.10/dist/hls.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Poppins", sans-serif; }
      body { background-color: #000000; color: #ffffff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; -webkit-user-select: none; user-select: none; }
      .header { background: #050505; padding: 5px 30px; display: flex; align-items: center; border-bottom: 1px solid #111; height: 100px; position: relative; flex-shrink: 0; }
      .header h1 { font-size: 26px; font-weight: 600; letter-spacing: 2px; color: #ffffff; }
      .header span { color: #666; font-weight: 300; }
      .live-clock-container { margin-left: auto; display: flex; align-items: center; gap: 22px; color: #ffffff; font-size: 18px; font-weight: 600; font-family: monospace; }
      #liveClock { display: inline-block; width: 255px; text-align: right; letter-spacing: 1px; }
      .analog-clock-wrapper { width: 84px; height: 84px; position: relative; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
      canvas#analogClockCanvas { width: 84px; height: 84px; display: block; }
      .main-container { display: flex; flex: 1; height: calc(100vh - 100px); width: 100%; overflow: hidden; }
      .viewport-section { width: 71%; background: #000; display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; }
      video { width: 100%; height: 100%; background: #000; object-fit: contain; cursor: pointer; }
      .viewport-section.maximized { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 99999; }
      .channel-toast { position: absolute; top: 30px; right: 30px; background: rgba(0,0,0,0.9); border: 2px solid #333; color: #ffffff; padding: 12px 28px; border-radius: 6px; font-size: 18px; font-weight: 600; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; z-index: 10010; box-shadow: 0 6px 20px rgba(0,0,0,0.8); letter-spacing: 0.5px; }
      .channel-toast.show { opacity: 1; }
      .custom-controls-bar { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,0.95)); padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 10000; }
      .custom-controls-bar.show { opacity: 1; pointer-events: auto; }
      .controls-left, .controls-right { display: flex; align-items: center; gap: 22px; position: relative; }
      .control-icon-btn { background: none; border: none; color: #ffffff; font-size: 18px; cursor: pointer; outline: none; transition: color 0.2s; }
      .control-icon-btn:hover { color: #aaaaaa; }
      .time-display { font-size: 14px; color: #cccccc; font-weight: 400; font-family: monospace; width: 110px; text-align: left; }
      .volume-container { display: flex; align-items: center; gap: 8px; position: relative; }
      .volume-slider { width: 0; height: 4px; -webkit-appearance: none; appearance: none; background: #444; border-radius: 2px; outline: none; opacity: 0; transition: width 0.2s ease, opacity 0.2s ease; cursor: pointer; }
      .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #ffffff; cursor: pointer; }
      .volume-container:hover .volume-slider { width: 70px; opacity: 1; }
      .bar-arrows-group { display: flex; align-items: center; gap: 18px; margin-right: 5px; }
      .bar-arrow-btn { background: none; border: none; color: #ffffff; font-size: 18px; cursor: pointer; outline: none; transition: transform 0.1s; }
      .bar-arrow-btn:hover { color: #aaaaaa; transform: scale(1.15); }
      .options-menu { position: absolute; bottom: 45px; right: 0; background: #111; border: 1px solid #222; border-radius: 8px; padding: 6px 0; min-width: 160px; display: none; flex-direction: column; z-index: 10005; box-shadow: 0 4px 15px rgba(0,0,0,0.8); }
      .options-menu.active { display: flex; }
      .menu-item { background: none; border: none; color: #ccc; padding: 10px 18px; text-align: left; font-size: 14px; cursor: pointer; width: 100%; transition: background 0.2s; }
      .menu-item:hover { background: #222; color: #fff; }
      .menu-item.active-speed { color: #fff; font-weight: 600; background: #1a1a1a; }
      .sidebar { width: 29%; background: #0a0a0a; display: flex; flex-direction: column; border-left: 1px solid #111; position: relative; height: 100%; overflow: hidden; padding-right: 55px; }
      .search-container { padding: 15px; background: #0a0a0a; display: flex; align-items: center; flex-shrink: 0; }
      .search-container input { width: 100%; padding: 10px 20px; font-size: 14px; border: 1px solid #222; border-radius: 30px; background: #111; color: #fff; outline: none; }
      .search-container input:focus { border-color: #444; background: #141414; }
      .scroll-controls-side { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 50; }
      .scroll-btn { background: #141414; color: #aaa; border: 1px solid #252525; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; justify-content: center; align-items: center; transition: all 0.2s; outline: none; box-shadow: 0 4px 10px rgba(0,0,0,0.6); }
      .scroll-btn:hover { background: #252525; color: #fff; border-color: #444; transform: scale(1.08); }
      .category-container { display: flex; flex-wrap: nowrap; overflow-x: auto; gap: 8px; padding: 5px 15px 15px 15px; background: #0a0a0a; flex-shrink: 0; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
      .category-container::-webkit-scrollbar { display: none; }
      .cat-btn { background: #141414; border: 1px solid #222; color: #888; padding: 6px 16px; border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap; outline: none; transition: all 0.15s; }
      .cat-btn.active { background: #ffffff; color: #000000; border-color: #ffffff; font-weight: 600; }
      .asset-grid { flex: 1; overflow-y: auto; padding: 0 5px 15px 15px; display: flex; flex-wrap: wrap; gap: 10px; align-content: flex-start; scroll-behavior: smooth; }
      .asset-grid::-webkit-scrollbar { display: none; }
      .item-card { background: #111; border: 1px solid #1c1c1c; border-radius: 10px; height: 125px; width: calc(33.33% - 7px); padding: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: background 0.2s ease, border-color 0.2s ease; outline: none; }
      .item-card:hover { background: #1a1a1a; border-color: #555; }
      .item-card img { max-width: 100%; max-height: 65px; object-fit: contain; margin-bottom: 8px; display: block; }
      .item-card span { font-size: 14px; font-weight: 400; text-align: center; color: #999; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; display: block; }
      .item-card.active-item { background: #ffffff !important; border-color: #ffffff !important; }
      .item-card.active-item span { color: #000000 !important; font-weight: 600 !important; }
      .item-card.active-item img { filter: brightness(0); -webkit-filter: brightness(0); }
      @media (max-width: 768px) {
        body { overflow-y: auto; display: block; height: auto; }
        .header { height: 60px; padding: 5px 15px; justify-content: center; }
        .header h1 { font-size: 20px; }
        .live-clock-container { display: none !important; }
        .main-container { flex-direction: column; height: auto; overflow: visible; display: block; }
        .viewport-section { width: 100% !important; height: 35vh; min-height: 250px; position: sticky; top: 0; z-index: 999; }
        .sidebar { width: 100% !important; height: auto; border-left: none; padding-right: 0 !important; overflow: visible; }
        .scroll-controls-side { display: none; }
        .category-container { padding: 10px 15px; }
        .asset-grid { padding: 0 15px 30px 15px !important; overflow-y: visible; height: auto; gap: 10px; }
        .item-card { width: calc(50% - 5px) !important; height: 110px; margin: 0; }
        .custom-controls-bar { padding: 10px 15px; }
        .volume-container { display: none; }
        .time-display { display: none; }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>CORE<span>ASSETS</span></h1>
      <div class="live-clock-container" id="liveClockContainer">
        <div class="analog-clock-wrapper">
          <canvas id="analogClockCanvas" width="168" height="168"></canvas>
        </div>
        <span id="liveClock">--/--/---- --:--:-- --</span>
      </div>
    </div>

    <div class="main-container">
      <div class="viewport-section" id="viewportSection">
        <video id="main-player" autoplay playsinline></video>
        <div class="channel-toast" id="channelToast">Channel Name</div>
        <div class="custom-controls-bar" id="customControlsBar">
          <div class="controls-left">
            <button class="control-icon-btn" onclick="togglePlayPause()"><i id="playPauseIcon" class="fa-solid fa-pause"></i></button>
            <div class="time-display" id="timeDisplay">LIVE STREAM</div>
          </div>
          <div class="controls-right">
            <div class="volume-container">
              <button class="control-icon-btn" onclick="toggleMute()"><i id="volumeIcon" class="fa-solid fa-volume-high"></i></button>
              <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)">
            </div>
            <div class="bar-arrows-group">
              <button class="bar-arrow-btn" onclick="changeChannel(-1,event)"><i class="fa-solid fa-backward"></i></button>
              <button class="bar-arrow-btn" onclick="changeChannel(1,event)"><i class="fa-solid fa-forward"></i></button>
            </div>
            <button class="control-icon-btn" onclick="toggleMaximizeMode()">
              <i id="maximizeIcon" class="fa-solid fa-expand"></i>
            </button>
            <div style="position:relative;">
              <button class="control-icon-btn" onclick="toggleOptionsMenu(event)"><i class="fa-solid fa-ellipsis-vertical"></i></button>
              <div class="options-menu" id="optionsMenu">
                <button class="menu-item" onclick="setSpeed(0.5,this)">0.5x Speed</button>
                <button class="menu-item active-speed" onclick="setSpeed(1.0,this)">Normal Speed</button>
                <button class="menu-item" onclick="setSpeed(1.5,this)">1.5x Speed</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="sidebar">
        <div class="search-container">
          <input type="text" id="searchInput" placeholder="Search Channels..." oninput="filterItems()" onkeyup="filterItems()" />
        </div>
        <div class="scroll-controls-side">
          <button class="scroll-btn" onclick="scrollGrid(-1)"><i class="fa-solid fa-arrow-up"></i></button>
          <button class="scroll-btn" onclick="scrollGrid(1)"><i class="fa-solid fa-arrow-down"></i></button>
        </div>
        <div class="category-container" id="categoryContainer">
          <button class="cat-btn active" onclick="switchCategory('All',this)">All</button>
          <button class="cat-btn" onclick="switchCategory('Bangla',this)">Bangla</button>
          <button class="cat-btn" onclick="switchCategory('Sports',this)">Sports</button>
          <button class="cat-btn" onclick="switchCategory('Spiritual',this)">Spiritual</button>
          <button class="cat-btn" onclick="switchCategory('Cartoon',this)">Cartoon</button>
          <button class="cat-btn" onclick="switchCategory('Geography',this)">Geography</button>
          <button class="cat-btn" onclick="switchCategory('Bangla News',this)">Bangla News</button>
          <button class="cat-btn" onclick="switchCategory('International News',this)">International News</button>
          <button class="cat-btn" onclick="switchCategory('Movies',this)">Movies</button>
          <button class="cat-btn" onclick="switchCategory('Indian',this)">Indian</button>
          <button class="cat-btn" onclick="switchCategory('Others',this)">Others</button>
        </div>
        <div class="asset-grid" id="assetGrid"></div>
      </div>
    </div>

    <script>
      document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
      function padZero(n){ return n < 10 ? '0'+n : n; }

      /* ================================================================
         PROXY ENGINE
         ----------------------------------------------------------------
         ROOT CAUSE (confirmed from screenshot + test URLs):
         GitHub Pages serves over HTTPS. The browser then blocks:
           1. http:// URLs        → Mixed Content (hard block, silent)
           2. https:// URLs with no CORS header → CORS block
           3. IP:port servers     → no valid TLS cert → both problems

         THE ONLY RELIABLE FIX for a static GitHub Pages site:
         Route every stream through a CORS proxy that:
           • Adds "Access-Control-Allow-Origin: *" header
           • Rewrites http → https automatically (it runs server-side)

         We use allorigins.win which is a free, reliable, open-source
         CORS proxy specifically designed for this use case.
         Format: https://api.allorigins.win/raw?url=<encoded_stream_url>

         SMART FALLBACK CHAIN:
         1. Try direct URL first (works on localhost / http:// pages)
         2. On error → retry with allorigins proxy
         3. On proxy error → try alternative corsproxy.io proxy
         This means VSCode (localhost) uses direct, hosted uses proxy.
         ================================================================ */

      var PROXIES = [
        function(url){ return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url); },
        function(url){ return 'https://corsproxy.io/?' + encodeURIComponent(url); }
      ];

      /* Only apply proxy when page is on https (GitHub Pages etc.) */
      var needsProxy = (window.location.protocol === 'https:');

      /* Convert http → https for the URL itself before proxying.
         allorigins fetches it server-side so http is fine there,
         but some proxy endpoints prefer https input. */
      function normalizeUrl(url) {
        if (!url) return url;
        /* Strip any accidental whitespace */
        url = url.replace(/^\s+|\s+$/g,'');
        return url;
      }

      /* =================================================================
         GLOBALS
      ================================================================= */
      var cacheBuster  = new Date().getTime();
      var dataSourceUrl= 'https://gist.githubusercontent.com/ayonpaulofficial-bit/0634edaf19b269aba5bf62523cc19e15/raw/sdyt.m3u?cb='+cacheBuster;
      var masterItems  = [];
      var displayItems = [];
      var activeChannel= null;

      var corePlayer        = document.getElementById('main-player');
      var assetGrid         = document.getElementById('assetGrid');
      var viewportSection   = document.getElementById('viewportSection');
      var customControlsBar = document.getElementById('customControlsBar');
      var playPauseIcon     = document.getElementById('playPauseIcon');
      var maximizeIcon      = document.getElementById('maximizeIcon');
      var timeDisplay       = document.getElementById('timeDisplay');
      var volumeIcon        = document.getElementById('volumeIcon');
      var volumeSlider      = document.getElementById('volumeSlider');
      var optionsMenu       = document.getElementById('optionsMenu');
      var categoryContainer = document.getElementById('categoryContainer');
      var channelToast      = document.getElementById('channelToast');
      var hlsPlayer         = null;
      var controlTimer      = null;
      var toastTimer        = null;
      var initialLoad       = true;
      var previousVolume    = 1;

      /* =================================================================
         CATEGORY EDGE-SCROLL
      ================================================================= */
      var catScrollInterval = null;
      categoryContainer.addEventListener('mousemove', function(e){
        var rect  = categoryContainer.getBoundingClientRect();
        var x     = e.clientX - rect.left;
        clearInterval(catScrollInterval);
        if      (x > rect.width - 100){ catScrollInterval = setInterval(function(){ categoryContainer.scrollLeft += 6; }, 15); }
        else if (x < 100)             { catScrollInterval = setInterval(function(){ categoryContainer.scrollLeft -= 6; }, 15); }
      });
      categoryContainer.addEventListener('mouseleave', function(){ clearInterval(catScrollInterval); });

      var catBtns = document.querySelectorAll('.cat-btn');
      for (var k=0; k<catBtns.length; k++){
        catBtns[k].setAttribute('tabindex','0');
        catBtns[k].addEventListener('focus', function(){ this.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'}); });
      }

      categoryContainer.addEventListener('wheel', function(e){
        e.preventDefault();
        categoryContainer.scrollLeft += (e.deltaX || e.deltaY);
      });

      /* =================================================================
         ANALOG + DIGITAL CLOCK
      ================================================================= */
      function updatePremiumClock(){
        var canvas = document.getElementById('analogClockCanvas');
        if (!canvas) return;
        var ctx = canvas.getContext('2d');
        var radius = canvas.width / 2;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.save(); ctx.translate(radius,radius);
        var r = radius * 0.92;
        ctx.beginPath(); ctx.arc(0,0,r,0,2*Math.PI); ctx.fillStyle='#ffffff'; ctx.fill();
        ctx.strokeStyle='#000000'; ctx.lineWidth=r*0.06; ctx.stroke();
        for(var i=0;i<60;i++){
          var a=i*Math.PI/30; ctx.rotate(a); ctx.beginPath();
          if(i%5===0){ ctx.lineWidth=r*0.04; ctx.moveTo(0,-r*0.98); ctx.lineTo(0,-r*0.86); }
          else        { ctx.lineWidth=r*0.015;ctx.moveTo(0,-r*0.98); ctx.lineTo(0,-r*0.92); }
          ctx.strokeStyle='#000000'; ctx.stroke(); ctx.rotate(-a);
        }
        ctx.fillStyle='#000000'; ctx.font='bold '+Math.round(r*0.19)+'px Arial,sans-serif';
        ctx.textBaseline='middle'; ctx.textAlign='center';
        for(var n=1;n<=12;n++){
          var na=n*Math.PI/6;
          ctx.fillText(n.toString(), Math.sin(na)*r*0.72, -Math.cos(na)*r*0.72);
        }
        var now=new Date(), hr=now.getHours()%12, min=now.getMinutes(), sec=now.getSeconds();
        ctx.save(); ctx.rotate((hr*Math.PI/6)+(min*Math.PI/360)+(sec*Math.PI/21600));
        ctx.lineWidth=r*0.065; ctx.lineCap='round'; ctx.strokeStyle='#000000';
        ctx.beginPath(); ctx.moveTo(0,r*0.12); ctx.lineTo(0,-r*0.52); ctx.stroke(); ctx.restore();
        ctx.save(); ctx.rotate((min*Math.PI/30)+(sec*Math.PI/1800));
        ctx.lineWidth=r*0.045; ctx.lineCap='round'; ctx.strokeStyle='#000000';
        ctx.beginPath(); ctx.moveTo(0,r*0.12); ctx.lineTo(0,-r*0.76); ctx.stroke(); ctx.restore();
        ctx.save(); ctx.rotate(sec*Math.PI/30);
        ctx.lineWidth=r*0.018; ctx.lineCap='round'; ctx.strokeStyle='#ff3333';
        ctx.beginPath(); ctx.moveTo(0,r*0.22); ctx.lineTo(0,-r*0.84); ctx.stroke(); ctx.restore();
        ctx.beginPath(); ctx.arc(0,0,r*0.045,0,2*Math.PI); ctx.fillStyle='#ff3333'; ctx.fill();
        ctx.lineWidth=r*0.01; ctx.strokeStyle='#000000'; ctx.stroke(); ctx.restore();
        var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        var ampm=now.getHours()>=12?'PM':'AM', dh=now.getHours()%12||12;
        var cd=document.getElementById('liveClock');
        if(cd) cd.innerText=padZero(now.getDate())+' '+months[now.getMonth()]+' '+now.getFullYear()+' | '+padZero(dh)+':'+padZero(min)+':'+padZero(sec)+' '+ampm;
      }
      setInterval(updatePremiumClock,1000); updatePremiumClock();

      /* =================================================================
         M3U FETCH & PARSE
      ================================================================= */
      function fetchText(url, cb){
        var x = new XMLHttpRequest();
        x.open('GET', url, true);
        x.onreadystatechange = function(){
          if(x.readyState===4){ if(x.status===200){ cb(null, x.responseText); } else { cb('status '+x.status); } }
        };
        x.onerror = function(){ cb('network error'); };
        x.send();
      }

      fetchText(dataSourceUrl, function(err, text){
        if(err){ console.warn('M3U fetch failed:', err); return; }
        var lines=text.split('\n'), cur=null;
        for(var i=0;i<lines.length;i++){
          var line=lines[i].replace(/^\s+|\s+$/g,'');
          if(line.indexOf('#EXTINF')===0){
            var name='Unknown Channel', logo='', group='Others';
            var ci=line.indexOf(','); if(ci!==-1) name=line.substring(ci+1).replace(/^\s+|\s+$/g,'');
            var lm=line.match(/tvg-logo="([^"]*)"/);   if(lm) logo=lm[1];
            var gm=line.match(/group-title="([^"]*)"/); if(gm) group=gm[1];
            cur={name:name,logo:logo,category:group};
          } else if(line && line.indexOf('#')!==0 && cur){
            cur.url=line; masterItems.push(cur); cur=null;
          }
        }
        switchCategory('All', document.querySelector('.cat-btn.active'));
      });

      /* =================================================================
         SWITCH CATEGORY  — BUG FIX: was `buttons.className` (NodeList),
         now correctly uses the `element` parameter (clicked button).
      ================================================================= */
      function switchCategory(cat, element){
        var btns=document.querySelectorAll('.cat-btn');
        for(var i=0;i<btns.length;i++) btns[i].className=btns[i].className.replace(/\bactive\b/g,'').trim();
        if(element) element.className += ' active';
        document.getElementById('searchInput').value='';
        displayItems=[];
        for(var j=0;j<masterItems.length;j++){
          if(cat==='All' || masterItems[j].category.toLowerCase()===cat.toLowerCase()) displayItems.push(masterItems[j]);
        }
        buildGrid();
      }

      function filterItems(){
        var q=document.getElementById('searchInput').value.toLowerCase();
        var cards=document.querySelectorAll('.item-card');
        for(var i=0;i<displayItems.length;i++){
          if(cards[i]) cards[i].style.display=(displayItems[i].name.toLowerCase().indexOf(q)!==-1)?'flex':'none';
        }
      }

      function buildGrid(){
        assetGrid.innerHTML='';
        for(var i=0;i<displayItems.length;i++){
          var item=displayItems[i];
          var card=document.createElement('div');
          card.className='item-card'+((activeChannel&&activeChannel.url===item.url)?' active-item':'');
          card.innerHTML=item.logo
            ? '<img src="'+item.logo+'" onerror="this.style.display=\'none\'"><span>'+item.name+'</span>'
            : '<span>'+item.name+'</span>';
          (function(ci){ card.onclick=function(){ streamSource(ci); }; })(item);
          assetGrid.appendChild(card);
        }
        if(initialLoad && displayItems.length>0){ initialLoad=false; streamSource(displayItems[0]); }
      }

      function scrollGrid(dir){ assetGrid.scrollTop += dir*250; }

      /* =================================================================
         STREAM SOURCE — SMART PROXY FALLBACK ENGINE
         ----------------------------------------------------------------
         Strategy:
           Step 1: Try the raw URL directly (works on localhost / http pages)
           Step 2: If HLS error → retry with PROXIES[0] (allorigins)
           Step 3: If still error → retry with PROXIES[1] (corsproxy.io)

         This 3-step fallback means:
           • VSCode (localhost/http) → direct, no proxy overhead
           • GitHub Pages (https) → proxy kicks in automatically
           • TV (Vewd, http page) → direct works fine
      ================================================================= */
      var currentProxyIndex = -1; /* -1 = direct, 0,1 = proxy index */
      var pendingItem = null;

      function buildHlsUrl(rawUrl, proxyIdx){
        if(proxyIdx < 0) return rawUrl;
        return PROXIES[proxyIdx](rawUrl);
      }

      function tryLoad(item, proxyIdx){
        if(hlsPlayer){ hlsPlayer.destroy(); hlsPlayer=null; }
        corePlayer.removeAttribute('src');

        var rawUrl   = normalizeUrl(item.url);
        var targetUrl= buildHlsUrl(rawUrl, proxyIdx);

        var startPb = function(){
          var p=corePlayer.play();
          if(p!==undefined) p.catch(function(){});
        };

        if(typeof Hls !== 'undefined' && Hls.isSupported()){
          hlsPlayer = new Hls({
            lowLatencyMode: false,
            maxBufferLength: 10,
            maxMaxBufferLength: 20,
            liveSyncDurationCount: 3,
            enableWorker: true,
            xhrSetup: function(xhr){ xhr.withCredentials=false; }
          });
          hlsPlayer.loadSource(targetUrl);
          hlsPlayer.attachMedia(corePlayer);
          hlsPlayer.on(Hls.Events.MANIFEST_PARSED, startPb);

          hlsPlayer.on(Hls.Events.ERROR, function(event, data){
            if(!data.fatal) return;
            /* Fatal error on current attempt — try next proxy */
            var nextProxy = proxyIdx + 1;
            if(nextProxy < PROXIES.length && needsProxy){
              console.log('Proxy '+proxyIdx+' failed, trying proxy '+nextProxy+'...');
              tryLoad(item, nextProxy);
            } else if(proxyIdx < 0 && needsProxy){
              /* Direct failed on https page, try first proxy */
              console.log('Direct failed on https, trying proxy 0...');
              tryLoad(item, 0);
            } else {
              /* All options exhausted */
              if(data.type===Hls.ErrorTypes.MEDIA_ERROR) hlsPlayer.recoverMediaError();
              else { hlsPlayer.destroy(); hlsPlayer=null; }
            }
          });
        } else if(corePlayer.canPlayType('application/vnd.apple.mpegurl')){
          /* Safari / Vewd native HLS */
          corePlayer.src = targetUrl;
          corePlayer.load();
          corePlayer.addEventListener('loadedmetadata', startPb, {once:true});
          corePlayer.onerror = function(){
            var nextProxy = proxyIdx + 1;
            if(nextProxy < PROXIES.length && needsProxy){ tryLoad(item, nextProxy); }
          };
        } else {
          corePlayer.src = targetUrl;
          corePlayer.load();
          startPb();
        }
      }

      function streamSource(item){
        if(!item) return;
        activeChannel = item;

        /* Start with direct URL; proxy fallback fires automatically on error */
        tryLoad(item, needsProxy ? 0 : -1);

        /* Update card highlight */
        var cards=document.querySelectorAll('.item-card');
        for(var j=0;j<cards.length;j++){
          cards[j].className=cards[j].className.replace(/\bactive-item\b/g,'').trim();
          if(displayItems[j] && displayItems[j].url===item.url) cards[j].className+=' active-item';
        }
      }

      /* =================================================================
         CHANNEL NAVIGATION
      ================================================================= */
      function changeChannel(step, event){
        if(event) event.stopPropagation();
        if(!activeChannel || displayItems.length===0) return;
        var idx=-1;
        for(var i=0;i<displayItems.length;i++){ if(displayItems[i].url===activeChannel.url){ idx=i; break; } }
        if(idx!==-1) streamSource(displayItems[(idx+step+displayItems.length)%displayItems.length]);
      }

      /* =================================================================
         VOLUME
      ================================================================= */
      function setVolume(val){
        corePlayer.volume=val; volumeSlider.value=val;
        volumeIcon.className=(val==0)?'fa-solid fa-volume-xmark':(val<0.5)?'fa-solid fa-volume-low':'fa-solid fa-volume-high';
      }
      function toggleMute(){
        if(corePlayer.volume>0){ previousVolume=corePlayer.volume; setVolume(0); }
        else{ setVolume(previousVolume>0?previousVolume:1); }
      }

      /* =================================================================
         OPTIONS MENU
      ================================================================= */
      function toggleOptionsMenu(event){
        event.stopPropagation();
        if(optionsMenu.className.indexOf('active')!==-1) optionsMenu.className=optionsMenu.className.replace(/\bactive\b/g,'').trim();
        else optionsMenu.className+=' active';
      }
      function setSpeed(v,el){
        corePlayer.playbackRate=v;
        var mi=document.querySelectorAll('.menu-item');
        for(var i=0;i<mi.length;i++) mi[i].className=mi[i].className.replace(/\bactive-speed\b/g,'').trim();
        el.className+=' active-speed';
        optionsMenu.className=optionsMenu.className.replace(/\bactive\b/g,'').trim();
      }

      /* =================================================================
         PLAYER EVENTS
      ================================================================= */
      corePlayer.addEventListener('play',  function(){ playPauseIcon.className='fa-solid fa-pause'; });
      corePlayer.addEventListener('pause', function(){ playPauseIcon.className='fa-solid fa-play'; });
      corePlayer.addEventListener('timeupdate', function(){
        if(corePlayer.duration && corePlayer.duration!==Infinity){
          var cm=Math.floor(corePlayer.currentTime/60), cs=Math.floor(corePlayer.currentTime%60);
          var dm=Math.floor(corePlayer.duration/60),    ds=Math.floor(corePlayer.duration%60);
          timeDisplay.innerText=cm+':'+padZero(cs)+' / '+dm+':'+padZero(ds);
        } else { timeDisplay.innerText='LIVE STREAM'; }
      });
      function togglePlayPause(){
        if(corePlayer.paused){ var p=corePlayer.play(); if(p!==undefined) p.catch(function(){}); }
        else corePlayer.pause();
      }

      /* =================================================================
         CONTROLS OVERLAY
      ================================================================= */
      function triggerControlsOverlay(){
        if(customControlsBar.className.indexOf('show')===-1) customControlsBar.className+=' show';
        clearTimeout(controlTimer);
        controlTimer=setTimeout(function(){
          customControlsBar.className=customControlsBar.className.replace(/\bshow\b/g,'').trim();
          optionsMenu.className=optionsMenu.className.replace(/\bactive\b/g,'').trim();
        }, 3000);
      }

      /* =================================================================
         FULLSCREEN  (standard + webkit for Vewd TV)
      ================================================================= */
      function toggleMaximizeMode(){
        if(!document.fullscreenElement && !document.webkitFullscreenElement){
          if(viewportSection.requestFullscreen)       viewportSection.requestFullscreen();
          else if(viewportSection.webkitRequestFullscreen) viewportSection.webkitRequestFullscreen();
        } else {
          if(document.exitFullscreen)       document.exitFullscreen();
          else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
      }

      var syncFullscreen=function(){
        if(document.fullscreenElement||document.webkitFullscreenElement){
          if(viewportSection.className.indexOf('maximized')===-1) viewportSection.className+=' maximized';
          maximizeIcon.className='fa-solid fa-compress';
          if(activeChannel){
            channelToast.innerText=activeChannel.name;
            if(channelToast.className.indexOf('show')===-1) channelToast.className+=' show';
            clearTimeout(toastTimer);
            toastTimer=setTimeout(function(){ channelToast.className=channelToast.className.replace(/\bshow\b/g,'').trim(); },2500);
          }
        } else {
          viewportSection.className=viewportSection.className.replace(/\bmaximized\b/g,'').trim();
          maximizeIcon.className='fa-solid fa-expand';
          channelToast.className=channelToast.className.replace(/\bshow\b/g,'').trim();
        }
        triggerControlsOverlay();
      };
      document.addEventListener('fullscreenchange',       syncFullscreen);
      document.addEventListener('webkitfullscreenchange', syncFullscreen);
      viewportSection.addEventListener('mousemove', triggerControlsOverlay);
      viewportSection.addEventListener('click', function(){
        optionsMenu.className=optionsMenu.className.replace(/\bactive\b/g,'').trim();
        triggerControlsOverlay();
      });
      viewportSection.addEventListener('dblclick', function(e){ e.preventDefault(); e.stopPropagation(); toggleMaximizeMode(); });
      corePlayer.addEventListener('dblclick', function(e){ e.preventDefault(); e.stopPropagation(); toggleMaximizeMode(); });
      document.addEventListener('click', function(){ optionsMenu.className=optionsMenu.className.replace(/\bactive\b/g,'').trim(); });

      /* =================================================================
         HARDWARE REMOTE KEY CONTROL (TV remote + keyboard)
      ================================================================= */
      document.addEventListener('keydown', function(e){
        triggerControlsOverlay();
        if(e.keyCode===427||e.keyCode===33||e.key==='ChannelUp'  ||e.keyCode===38){ e.preventDefault(); changeChannel(1); }
        else if(e.keyCode===428||e.keyCode===34||e.key==='ChannelDown'||e.keyCode===40){ e.preventDefault(); changeChannel(-1); }
      });
    </script>
  </body>
</html>
